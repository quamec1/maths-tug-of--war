<!DOCTYPE html>
<html>
<head>
    <title>TUG OF WAR: MATHEMATICS</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            text-align: center;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            color: white;
        }

        h1 {
            margin-top: 20px;
            font-size: 36px;
        }

        #ropeContainer {
            width: 85%;
            height: 140px;
            margin: 30px auto;
            position: relative;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
        }

        #player1, #player2 {
            position: absolute;
            top: 50%;
            font-size: 45px;
            transform: translateY(-50%);
        }

        #player1 { left: 10px; }
        #player2 { right: 10px; }

        #ropeLine {
            position: absolute;
            top: 50%;
            left: 10%;
            width: 80%;
            height: 6px;
            background: linear-gradient(90deg, #a97142, #f2c14e, #a97142);
            transform: translateY(-50%);
            border-radius: 10px;
        }

        /* 🪢 CENTER KNOT */
        #ropeCenter {
            width: 24px;
            height: 24px;
            background: #111;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.25s ease;
        }

        .players {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
        }

        .player {
            width: 40%;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
        }

        .question {
            font-size: 24px;
            margin-bottom: 10px;
        }

        input {
            padding: 12px;
            font-size: 18px;
            width: 80%;
            border-radius: 8px;
            border: none;
            text-align: center;
        }

        button {
            padding: 12px 18px;
            margin-top: 10px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #ffb347;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        #restartBtn {
            display: none;
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 10px;
            background: #00d4ff;
            color: black;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🎮 TUG OF WAR: MATHEMATICS</h1>

<div id="ropeContainer">
    <div id="player1">🧍‍♂️</div>

    <div id="ropeLine"></div>

    <div id="ropeCenter"></div>

    <div id="player2">🧍‍♀️</div>
</div>

<div class="players">
    <div class="player">
        <h3>Player 1</h3>
        <div id="q1" class="question"></div>
        <input type="number" id="p1Answer" placeholder="Answer">
        <button onclick="submitAnswer(1)">Submit</button>
    </div>

    <div class="player">
        <h3>Player 2</h3>
        <div id="q2" class="question"></div>
        <input type="number" id="p2Answer" placeholder="Answer">
        <button onclick="submitAnswer(2)">Submit</button>
    </div>
</div>

<div id="result"></div>
<button id="restartBtn" onclick="restartGame()">🔄 Restart Game</button>

<script>
    let ropePosition = 0;
    const maxPosition = 10;

    let q1Answer, q2Answer;

    function generateNewQuestion(player) {
        let type = Math.floor(Math.random() * 4);

        let a = Math.floor(Math.random() * 10) + 1;
        let b = Math.floor(Math.random() * 10) + 1;
        let answer, text;

        if (type === 0) {
            answer = a + b;
            text = `${a} + ${b} = ?`;
        } else if (type === 1) {
            if (a < b) [a, b] = [b, a];
            answer = a - b;
            text = `${a} - ${b} = ?`;
        } else if (type === 2) {
            answer = a * b;
            text = `${a} × ${b} = ?`;
        } else {
            answer = a;
            text = `${a * b} ÷ ${b} = ?`;
        }

        if (player === 1) {
            q1Answer = answer;
            document.getElementById("q1").innerText = text;
        } else {
            q2Answer = answer;
            document.getElementById("q2").innerText = text;
        }
    }

    // 🎯 CORRECT FINAL DIRECTION RULE
    function submitAnswer(player) {
        if (player === 1) {
            let val = Number(document.getElementById("p1Answer").value);

            if (val === q1Answer) {
                ropePosition--; // ⬅️ Player 1 pulls LEFT
                show("Player 1 correct 💪");
                generateNewQuestion(1);
            } else {
                show("Player 1 wrong ❌");
            }

            document.getElementById("p1Answer").value = "";
        }

        if (player === 2) {
            let val = Number(document.getElementById("p2Answer").value);

            if (val === q2Answer) {
                ropePosition++; // ➡️ Player 2 pulls RIGHT
                show("Player 2 correct 💪");
                generateNewQuestion(2);
            } else {
                show("Player 2 wrong ❌");
            }

            document.getElementById("p2Answer").value = "";
        }

        updateRope();
    }

    function updateRope() {
        let knot = document.getElementById("ropeCenter");
        let container = document.getElementById("ropeContainer");
        let width = container.offsetWidth;

        let stepSize = width / (maxPosition * 2);
        let offset = ropePosition * stepSize;

        // 🪢 move from true center
        knot.style.transform =
            `translate(-50%, -50%) translateX(${offset}px)`;

        if (ropePosition >= maxPosition) endGame("🎉 Player 2 Wins!");
        if (ropePosition <= -maxPosition) endGame("🎉 Player 1 Wins!");
    }

    function show(text) {
        document.getElementById("result").innerText = text;
    }

    function endGame(msg) {
        document.getElementById("result").innerText = msg;

        document.querySelectorAll("button").forEach(b => {
            if (b.id !== "restartBtn") b.disabled = true;
        });

        document.getElementById("restartBtn").style.display = "inline-block";
    }

    function restartGame() {
        ropePosition = 0;

        document.querySelectorAll("button").forEach(b => b.disabled = false);
        document.getElementById("restartBtn").style.display = "none";
        document.getElementById("result").innerText = "";

        document.getElementById("p1Answer").value = "";
        document.getElementById("p2Answer").value = "";

        generateNewQuestion(1);
        generateNewQuestion(2);
        updateRope();
    }

    generateNewQuestion(1);
    generateNewQuestion(2);
</script>

</body>
</html>
